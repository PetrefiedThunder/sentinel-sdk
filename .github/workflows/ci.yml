name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install --upgrade pip uv

      - name: Install package + dev deps
        run: uv pip install --system -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Pytest
        run: pytest -q
