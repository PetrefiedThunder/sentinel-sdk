name: release

# python-semantic-release reads commit messages on main, derives the next
# version per conventional commits, updates CHANGELOG.md + pyproject.toml +
# __init__.py, commits + tags. The tag push triggers publish.yml which ships
# to PyPI via Trusted Publishing.
#
# TRIGGER IS MANUAL ON PURPOSE. Cutting a release publishes an immutable
# version to PyPI (irreversible) — the first run will cut v1.0.0. A maintainer
# runs this deliberately:  gh workflow run release.yml  (or the Actions UI).
# To restore auto-release on every merge to main, add back:
#     push:
#       branches: [main]
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install python-semantic-release
        # Pinned to v9: the [tool.semantic_release] config in pyproject.toml uses
        # the v8/v9 schema. v10+ restructured changelog templating and aborts
        # with KeyError 'changelog'. Verified: v9.21.1 generates the changelog
        # cleanly; v10.5.3 reproduces the failure.
        run: pip install 'python-semantic-release>=9,<10'

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          semantic-release version
          semantic-release publish
